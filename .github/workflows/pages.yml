name: Deploy docs site to GitHub Pages

# 只发布“站点必需文件”，内部资料（verify/、scripts/、data/raw 等）留在仓库、不公开。
on:
  push:
    branches: [main]
    paths:                       # 仅站点相关文件改动才触发
      - 'index.html'
      - 'web/**'
      - 'data/db/canonical.json'
      - 'data/db/translations_zh.json'
      - 'data/db/examples.json'
      - 'data/db/glossary.json'
      - '.github/workflows/pages.yml'
  workflow_dispatch:              # 允许手动触发

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Stage public site (whitelist only)
        run: |
          set -e
          mkdir -p public/web public/data/db
          cp index.html public/
          cp .nojekyll public/ 2>/dev/null || true
          cp web/index.html web/bilingual.html public/web/
          cp data/db/canonical.json data/db/translations_zh.json \
             data/db/examples.json data/db/glossary.json public/data/db/
          echo "Published files:"; find public -type f | sort

      - uses: actions/configure-pages@v5
        with:
          enablement: true          # 若仓库尚未启用 Pages，由工作流自动启用
      - uses: actions/upload-pages-artifact@v3
        with:
          path: public
      - id: deploy
        uses: actions/deploy-pages@v4
